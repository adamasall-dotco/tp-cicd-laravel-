name: Laravel CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:
  tests-applicatifs:

    runs-on: ubuntu-latest

    steps:

      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4


      - name: Initialiser PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, sqlite3
          tools: composer


      - name: Installer les dépendances Composer
        run: composer install --no-ansi --no-interaction --no-scripts --prefer-dist


      - name: Préparer le fichier environnement
        run: cp .env.example .env


      - name: Générer la clé Laravel
        run: php artisan key:generate


      - name: Exécuter les tests Laravel
        run: php artisan test